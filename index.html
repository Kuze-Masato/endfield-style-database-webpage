<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XX百科图鉴</title>
    <style>
        /* 全局基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #eeeff0;
            background-image: 
                linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* ========== 背景装饰层 ========== */
        .bg-decorations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .bg-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            opacity: 0.03;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 5 L95 85 L5 85 Z" fill="none" stroke="black" stroke-width="1.5"/><path d="M50 25 L80 75 L20 75 Z" fill="none" stroke="black" stroke-width="0.8"/></svg>') no-repeat center/contain;
        }

        .bg-waves {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 300px;
            opacity: 0.08;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg"><path d="M0 200 C 150 180 300 250 450 220 C 600 190 750 260 900 230 C 1050 200 1200 240 1200 240 V 300 H 0 Z" fill="none" stroke="black" stroke-width="0.5"/><path d="M0 220 C 150 200 300 270 450 240 C 600 210 750 280 900 250 C 1050 220 1200 260 1200 260 V 300 H 0 Z" fill="none" stroke="black" stroke-width="0.5"/><path d="M0 240 C 150 220 300 290 450 260 C 600 230 750 300 900 270 C 1050 240 1200 280 1200 280 V 300 H 0 Z" fill="none" stroke="black" stroke-width="0.5"/></svg>') repeat-x bottom/1200px 300px;
        }

        /* ========== 通用视图容器 ========== */
        .view-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }
        .view-layer.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ========== 开场开始页 ========== */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #eeeff0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
        }
        .splash-screen.slide-up { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        .splash-title { font-size: 72px; font-weight: bold; color: #333; letter-spacing: 12px; margin-bottom: 60px; opacity: 0.9; }
        .splash-tip { font-size: 18px; color: #666; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* ========== 顶部导航栏 ========== */
        .top-nav {
            width: 100%;
            height: 60px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 25px;
            left: 0;
            z-index: 100;
        }
        .nav-integrated-bar {
            width: 80%;
            max-width: 1200px;
            height: 48px;
            background-color: rgba(255, 255, 255, 0.95);
            border: 1.5px solid #1a1a1a;
            display: flex;
            align-items: center;
            padding: 0 10px;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.05);
            position: relative;
        }
        .search-icon-btn {
            font-size: 16px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
        }
        .search-icon-btn:hover { opacity: 1; }
        .breadcrumb-section {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            height: 100%;
            overflow: hidden;
        }
        .folder-icon { 
            width: 20px; 
            height: 16px; 
            background-color: #333; 
            clip-path: polygon(0% 20%, 30% 20%, 40% 0%, 100% 0%, 100% 100%, 0% 100%); 
            flex-shrink: 0;
        }
        .breadcrumb-item { 
            font-size: 14px; 
            color: #999; 
            font-weight: bold; 
            cursor: pointer; 
            white-space: nowrap;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .breadcrumb-item:hover { color: #333; }
        .breadcrumb-item.active { color: #333; }
        .breadcrumb-item span { color: #ccc; font-weight: normal; }

        .search-input-wrapper {
            width: 250px;
            height: 32px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            padding: 0 12px;
            margin-left: 20px;
        }
        .search-input-wrapper input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            letter-spacing: 1px;
        }
        .search-input-wrapper input::placeholder { color: #aaa; }

        /* 独立返回按钮 */
        .top-right-close {
            position: fixed;
            top: 25px;
            right: 50px;
            width: 48px;
            height: 48px;
            background-color: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 3000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .top-right-close:hover { transform: translateX(-5px); background-color: #333; }
        /* 箭头样式 */
        .top-right-close::before {
            content: '';
            width: 12px;
            height: 12px;
            border-left: 3px solid white;
            border-bottom: 3px solid white;
            transform: rotate(45deg);
            margin-left: 5px;
        }
        .top-right-close::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 3px;
            background-color: white;
            left: 15px;
        }

        /* 搜索结果面板 */
        .search-results-panel {
            position: absolute;
            top: 55px;
            right: 0;
            width: 350px;
            background: white;
            border: 1.5px solid #1a1a1a;
            box-shadow: 15px 15px 0 rgba(0,0,0,0.05);
            display: none;
            z-index: 200;
            max-height: 400px;
            overflow-y: auto;
        }
        .search-result-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #eee;
        }
        .search-result-item:hover { background: #f5f5f5; }
        .search-result-item img { width: 32px; height: 32px; object-fit: contain; background: #eee; }
        .search-result-name { font-weight: bold; font-size: 14px; color: #333; }
        .search-result-type { font-size: 11px; color: #999; margin-left: auto; background: #eee; padding: 2px 6px; }

        /* 制造链路底部预览面板 */
        .chain-preview-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            background: rgba(40, 40, 40, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 60px;
            color: white;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 25;
            border-top: 2px solid rgba(255,255,255,0.1);
        }
        .chain-preview-panel.active { transform: translateY(0); }
        .preview-img { width: 120px; height: 120px; object-fit: contain; margin-right: 40px; filter: drop-shadow(0 0 20px rgba(0,0,0,0.3)); }
        .preview-info { flex: 1; }
        .preview-title { font-size: 28px; font-weight: 900; margin-bottom: 5px; letter-spacing: 2px; }
        .preview-tag { display: inline-block; background: #666; padding: 2px 10px; font-size: 12px; font-weight: bold; margin-bottom: 15px; }
        .preview-desc { font-size: 14px; color: #ccc; max-width: 600px; line-height: 1.6; }
        .preview-btns { display: flex; gap: 20px; margin-left: auto; }
        .preview-btn { 
            padding: 10px 25px; 
            border: 1px solid white; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: bold; 
            transition: all 0.2s; 
            display: flex; 
            align-items: center; 
            gap: 10px;
        }
        .preview-btn:hover { background: white; color: #333; }
        .preview-btn.primary { background: white; color: #333; }
        .preview-btn.primary:hover { background: #ff6600; border-color: #ff6600; color: white; }

        /* 制造链路节点样式增强 */
        .chain-node { cursor: pointer; transition: all 0.2s; position: relative; }
        .chain-node:hover { transform: scale(1.05); }
        .chain-node.selected { outline: 3px solid #ff6600; outline-offset: 5px; }
        .chain-node.selected::after {
            content: '▼';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff6600;
            font-size: 20px;
        }

        /* 递归链路布局支持 */
        .flow-column {
            display: flex;
            flex-direction: column;
            gap: 60px;
            align-items: center;
        }
        .flow-group {
            display: flex;
            align-items: center;
            gap: 40px;
        }
        .recipe-path-line {
            height: 2px;
            background: #333;
            flex: 1;
            min-width: 40px;
            position: relative;
        }
        .recipe-path-line::after {
            content: '';
            position: absolute;
            right: -2px;
            top: -5px;
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 10px solid #333;
        }
        /* 下游反向箭头 */
        .recipe-path-line.downstream::after {
            right: auto;
            left: -2px;
            transform: rotate(180deg);
        }
        .recipe-path-line.downstream-out::after {
            right: -2px;
            left: auto;
            transform: rotate(0deg);
        }

        /* 虚线连接样式 (下游) */
        .recipe-path-line.dashed {
            background: none;
            border-top: 2px dashed #999;
        }
        .recipe-path-line.dashed::after {
            border-left-color: #999;
        }

        /* ========== 视图 A: 主页 (Home) ========== */
        #view-home { display: flex; align-items: center; justify-content: center; }
        .category-grid { display: flex; justify-content: space-between; align-items: center; width: 90%; max-width: 1600px; padding: 0 40px; }
        .category-card { position: relative; cursor: pointer; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; flex-direction: column; align-items: center; width: 220px; }
        .category-card:hover { transform: translateY(-15px); }
        .card-bg-number { position: absolute; top: -70px; left: 50%; transform: translateX(-50%); font-size: 160px; font-weight: 900; color: #000; opacity: 0.03; z-index: -1; user-select: none; font-style: italic; }
        
        .category-icon-wrapper { 
            width: 180px; 
            height: 180px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            margin-bottom: 30px; 
            background: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px); 
            background-size: 20px 20px; 
            border: 1px solid rgba(0,0,0,0.03);
        }
        .category-icon { 
            width: 120px; 
            height: 120px; 
            object-fit: contain;
            opacity: 0.85; 
            transition: all 0.3s; 
            font-size: 80px;
        }
        .sidebar-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .category-card:hover .category-icon { opacity: 1; transform: scale(1.1); }
        .category-name { font-size: 20px; font-weight: bold; color: #333; letter-spacing: 3px; border-top: 1.5px solid #333; padding-top: 12px; width: 85%; text-align: center; }

        /* ========== 视图 B: 分类列表 (List) ========== */
        #view-list { display: flex; padding-top: 80px; }
        .sidebar { width: 300px; height: 100%; padding: 30px 0 30px 50px; display: flex; flex-direction: column; gap: 8px; border-right: 1px solid rgba(0,0,0,0.05); }
        .sidebar-item { height: 60px; background: rgba(255,255,255,0.5); display: flex; align-items: center; padding: 0 25px; gap: 18px; cursor: pointer; transition: all 0.3s; position: relative; color: #666; border: 1px solid transparent; }
        .sidebar-item:hover { background: rgba(255,255,255,0.8); transform: translateX(8px); }
        .sidebar-item.active { background: #333; color: white; box-shadow: 10px 10px 20px rgba(0,0,0,0.1); border-color: #333; }
        .sidebar-item.active span:first-child { filter: invert(1); }
        
        .content-area { flex: 1; padding: 40px 80px; overflow-y: auto; }
        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 160px)); gap: 30px; }
        .item-card { width: 160px; height: 200px; background: white; border: 1px solid #c0c2c5; cursor: pointer; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; flex-direction: column; position: relative; padding: 2px; }
        .item-card:hover { transform: translateY(-10px); border-color: #333; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .img-box { width: 100%; height: 150px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
        .item-card:hover .img-box img { transform: scale(1.1); }
        .card-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; }
        .card-bottom.green { background: #2ecc71; }
        .card-bottom.blue { background: #3498db; }
        .card-bottom.orange { background: #e67e22; }

        /* ========== 视图 C: 详情 (Terminal Style) ========== */
        #view-detail { display: flex; padding-top: 80px; }
        .detail-container { width: 100%; height: 100%; display: flex; position: relative; overflow: hidden; }
        .detail-left { flex: 1; padding: 60px 100px; display: flex; flex-direction: column; position: relative; overflow-y: auto; }
        .detail-right { width: 450px; background: rgba(255,255,255,0.85); border-left: 1px solid #c0c2c5; padding: 50px; display: flex; flex-direction: column; gap: 60px; overflow-y: auto; }
        
        .detail-header { border-bottom: 1.5px solid #333; padding-bottom: 15px; margin-bottom: 35px; }
        .detail-header h1 { font-size: 42px; font-weight: 900; letter-spacing: 2px; margin-bottom: 8px; color: #333; }
        .detail-header span { font-size: 15px; color: #666; letter-spacing: 5px; font-family: monospace; }

        /* 标签样式 */
        .tag-container { display: flex; gap: 10px; margin-top: 15px; }
        .tag-pill { 
            padding: 4px 15px; 
            font-size: 12px; 
            font-weight: 900; 
            border-radius: 20px; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .tag-main { background: #333; color: white; border: 1.5px solid #333; }
        .tag-sub { background: white; color: #666; border: 1.5px solid #ddd; }

        .detail-desc { max-width: 650px; line-height: 2.2; color: #444; font-size: 17px; margin-bottom: 40px; }

        /* 配方区域样式 (Terminal) */
        .recipe-section-title { font-size: 18px; font-weight: 900; border-left: 6px solid #333; padding-left: 15px; margin-bottom: 30px; letter-spacing: 2px; }
        .recipe-box-terminal {
            background: #f8f9fa;
            border: 1px solid #ddd;
            padding: 40px;
            margin-bottom: 40px;
        }
        .recipe-flex { display: flex; align-items: center; justify-content: center; gap: 40px; }

        /* 九宫格样式 */
        .crafting-grid-container { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .crafting-grid-container span { font-size: 13px; color: #999; font-weight: bold; }
        .crafting-grid {
            display: grid;
            grid-template-columns: repeat(3, 56px);
            grid-template-rows: repeat(3, 56px);
            gap: 2px;
            background: #8b8b8b;
            padding: 2px;
            border: 2px solid #373737;
        }
        .grid-slot {
            width: 56px;
            height: 56px;
            background: #8b8b8b;
            border: 2px solid;
            border-color: #373737 #fff #fff #373737;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .grid-slot:hover { background: #a0a0a0; }
        .grid-slot img { width: 40px; height: 40px; object-fit: contain; }

        .recipe-arrow { font-size: 30px; color: #333; font-weight: bold; }

        .recipe-type-mc { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .recipe-type-label { 
            background: #333; 
            color: white;
            padding: 6px 15px; 
            font-size: 12px; 
            font-weight: bold; 
            letter-spacing: 1px;
        }
        .machine-info { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .machine-slot {
            width: 70px;
            height: 70px;
            background: white;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .machine-slot img { width: 50px; height: 50px; object-fit: contain; }
        .machine-name-mc { font-size: 12px; color: #666; font-weight: bold; }

        /* 属性项样式 (Terminal) */
        .property-item { font-size: 16px; margin-bottom: 15px; display: flex; align-items: center; }
        .property-item b { width: 80px; color: #999; font-weight: bold; }
        .property-item span { color: #333; font-weight: bold; }
        .property-item a { color: #ff6600; text-decoration: none; font-weight: bold; }

        .chain-btn-terminal {
            margin-top: auto;
            background: #1a1a1a;
            color: white;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-weight: 900;
            font-size: 18px;
            letter-spacing: 4px;
            cursor: pointer;
            transition: 0.3s;
        }
        .chain-btn-terminal:hover { background: #ff6600; }

        /* 管理员入口 */
        .admin-entry { position: fixed; bottom: 30px; left: 30px; width: 40px; height: 40px; background: white; border: 1.5px solid #333; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; opacity: 0.3; transition: 0.3s; }
        .admin-entry:hover { opacity: 1; transform: scale(1.1); background: #333; color: white; }

        /* 底部信息 */
        .bottom-info-bar { position: fixed; bottom: 30px; left: 60px; font-family: monospace; font-size: 14px; color: #999; z-index: 10; }
        .bottom-tag { position: fixed; bottom: 30px; right: 60px; font-family: monospace; font-size: 16px; font-weight: bold; color: #333; background: #fff; padding: 2px 10px; border: 1.5px solid #333; z-index: 10; }
    </style>
</head>
<body>
    <!-- 背景装饰层 -->
    <div class="bg-decorations">
        <div class="bg-logo"></div>
        <div class="bg-waves"></div>
    </div>

    <!-- 开场开始页 -->
    <div class="splash-screen" id="splashScreen">
        <h1 class="splash-title" >XX百科图鉴</h1>
        <p class="splash-tip">点击任意位置 / 按回车键进入</p>
    </div>

    <!-- 顶部导航栏  -->
    <div class="top-nav">
        <div class="nav-integrated-bar">
            <div class="breadcrumb-section">
                <div class="folder-icon"></div>
                <div class="breadcrumb-item" onclick="navigateTo({view:'home', atlas:null, cat:null, item:null})">
                    <span>/</span> XX百科图鉴
                </div>
                <div id="breadcrumb-dynamic" style="display:flex; gap:10px;"></div>
            </div>
            <div class="search-input-wrapper">
                <div class="search-icon-btn" style="margin-right: 10px;">🔍</div>
                <input type="text" placeholder="SEARCH..." id="global-search-input">
                <div class="search-results-panel" id="search-results-panel"></div>
            </div>
        </div>
    </div>
    <div class="top-right-close" id="global-close-btn"></div>

    <!-- 视图 A: 主页 -->
    <div id="view-home" class="view-layer active">
        <div class="category-grid" id="home-grid"></div>
    </div>

    <!-- 视图 B: 分类列表 -->
    <div id="view-list" class="view-layer">
        <aside class="sidebar" id="sidebar"></aside>
        <section class="content-area">
            <div class="item-grid" id="item-grid"></div>
        </section>
    </div>

    <!-- 视图 C: 详情 -->
    <div id="view-detail" class="view-layer">
        <div class="detail-container">
            <div class="detail-left" id="detail-left-content"></div>
            <div class="detail-right" id="detail-right-content"></div>
        </div>
        <!-- 制造链路视图 -->
        <div id="view-chain" class="chain-view" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#eeeff0; z-index:1000; display:none;">
            <div id="chain-draggable-area" style="cursor: grab; display: flex; align-items: center; justify-content: center; min-width: 100%; min-height: 100%;">
                <div class="flow-wrapper" id="flow-wrapper" style="display: flex; align-items: center; gap: 40px; padding: 150px;">
                    <!-- 动态渲染内容 -->
                </div>
            </div>
            <div style="position:absolute; bottom:200px; left:50%; transform:translateX(-50%); color:#999; font-size:12px; pointer-events:none; letter-spacing:2px; z-index: 2000;">按住鼠标左键即可拖动</div>
            
            <!-- 底部预览面板 -->
            <div class="chain-preview-panel" id="chain-preview-panel" style="z-index: 2000;">
                <img src="" class="preview-img" id="preview-img">
                <div class="preview-info">
                    <div class="preview-tag" id="preview-tag">设备</div>
                    <h2 class="preview-title" id="preview-title">名称</h2>
                    <p class="preview-desc" id="preview-desc">描述内容...</p>
                </div>
                <div class="preview-btns">
                    <div class="preview-btn" id="preview-btn-wiki">查看百科</div>
                    <div class="preview-btn primary" id="preview-btn-switch" style="display:none;">切换制造链路</div>
                </div>
            </div>
        </div>
    </div>

    <div class="admin-entry" title="管理中心" onclick="window.open('editor.html')">🛠️</div>

    <script src="data.js"></script>
    <script>
        // 0. 开场动画
        const splash = document.getElementById('splashScreen');
        const enterWiki = () => {
            splash.classList.add('slide-up');
            navigateTo({view:'home'});
        };
        splash.onclick = enterWiki;
        window.onkeydown = (e) => { if(e.key === 'Enter') enterWiki(); };

        // 核心视图切换状态
        let currentState = { view: 'home', atlas: null, cat: null, item: null };

        // 1. 路由与视图导航
        function navigateTo(state) {
            Object.assign(currentState, state);
            
            // 切换视图层可见性
            document.querySelectorAll('.view-layer').forEach(l => l.classList.remove('active'));
            const activeLayer = document.getElementById(`view-${currentState.view}`);
            if (activeLayer) activeLayer.classList.add('active');

            updateBreadcrumb();
            renderView();
        }

        document.getElementById('global-close-btn').onclick = () => {
            // 如果制造链路开启，先关闭链路
            if (document.getElementById('view-chain').style.display === 'flex') {
                toggleChain(false);
                return;
            }
            
            if (currentState.view === 'detail') navigateTo({view:'list', item:null});
            else if (currentState.view === 'list') navigateTo({view:'home', atlas:null, cat:null});
        };

        // 2. 面包屑导航更新
        function updateBreadcrumb() {
            const container = document.getElementById('breadcrumb-dynamic');
            container.innerHTML = '';
            if (currentState.atlas) {
                const atlas = wikiData.atlases.find(a => a.id === currentState.atlas);
                if (atlas) container.innerHTML += `<div class="breadcrumb-item" onclick="navigateTo({view:'list', item:null})"><span>/</span> ${atlas.name}</div>`;
            }
            if (currentState.item) {
                const item = wikiData.itemDetails[currentState.item];
                if (item) container.innerHTML += `<div class="breadcrumb-item active"><span>/</span> ${item.name}</div>`;
            }
        }

        // 2.5 通用图标渲染逻辑
        function renderIcon(icon, className) {
            if (!icon) return '';
            // 判断是否为图片路径 (http, ./, ../, data:)
            if (icon.startsWith('http') || icon.startsWith('.') || icon.startsWith('data:')) {
                return `<img src="${icon}" class="${className}">`;
            }
            // 判断是否为内联 SVG
            if (icon.startsWith('<svg')) {
                return `<div class="${className}">${icon}</div>`;
            }
            // 默认渲染为文字/Emoji
            return `<div class="${className}" style="display:flex; align-items:center; justify-content:center;">${icon}</div>`;
        }

        // 3. 视图渲染引擎
        function renderView() {
            if (currentState.view === 'home') renderHome();
            if (currentState.view === 'list') renderList();
            if (currentState.view === 'detail') renderDetail();
        }

        // --- A. 主页渲染 ---
        function renderHome() {
            const grid = document.getElementById('home-grid');
            grid.innerHTML = wikiData.atlases.map((a, i) => `
                <div class="category-card" onclick="navigateTo({view:'list', atlas:'${a.id}', cat:'${wikiData.categories[a.id]?.[0]?.id || ''}'})">
                    <div class="card-bg-number">${(i+1).toString().padStart(2, '0')}</div>
                    <div class="category-icon-wrapper">
                        ${renderIcon(a.icon, 'category-icon')}
                    </div>
                    <div class="category-name">${a.name}</div>
                </div>
            `).join('');
        }

        // --- B. 列表页渲染 ---
        function renderList() {
            const sidebar = document.getElementById('sidebar');
            const cats = wikiData.categories[currentState.atlas] || [];
            sidebar.innerHTML = cats.map(c => `
                <div class="sidebar-item ${c.id === currentState.cat ? 'active' : ''}" onclick="navigateTo({cat:'${c.id}'})">
                    ${renderIcon(c.icon, 'sidebar-icon')}
                    <span style="font-weight: bold; font-size: 16px;">${c.name}</span>
                </div>
            `).join('');

            const grid = document.getElementById('item-grid');
            const items = wikiData.items[currentState.cat] || [];
            grid.innerHTML = items.map(item => `
                <div class="item-card" onclick="navigateTo({view:'detail', item:'${item.id}'})">
                    <div class="img-box"><img src="${item.img}"></div>
                    <div class="item-name" style="padding:12px; font-size:13px; font-weight:bold; text-align:center; flex:1; display:flex; align-items:center; justify-content:center;">${item.name}</div>
                    <div class="card-bottom ${item.rarity}"></div>
                </div>
            `).join('');
        }

        // --- C. 详情页渲染 ---
        function renderDetail() {
            const item = wikiData.itemDetails[currentState.item];
            if (!item) return;

            // 仅渲染顶级路径或第一条路径
            let recipesHTML = '';
            if (item.recipes && item.recipes.length > 0) {
                // 找到顶级路径，如果没有则选第一条
                const mainRecipe = item.recipes.find(r => r.isMain) || item.recipes[0];
                
                let gridHTML = '';
                if (mainRecipe.grid && mainRecipe.grid.some(slot => slot !== null)) {
                    gridHTML = `
                        <div class="crafting-grid-container">
                            <span>合成材料</span>
                            <div class="crafting-grid">
                                ${mainRecipe.grid.map(slotId => {
                                    if (!slotId) return '<div class="grid-slot"></div>';
                                    const slotItem = wikiData.itemDetails[slotId];
                                    return `
                                        <div class="grid-slot" onclick="navigateTo({view:'detail', item:'${slotId}'})">
                                            <img src="${slotItem ? slotItem.image : ''}" title="${slotItem ? slotItem.name : ''}">
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                        <div class="recipe-arrow">→</div>
                    `;
                }

                recipesHTML = `
                    <div class="recipe-box-terminal">
                        <div class="recipe-flex">
                            ${gridHTML}
                            <div class="recipe-type-mc">
                                <div class="recipe-type-label">${mainRecipe.recipeType || 'CRAFTING'}</div>
                                <div class="machine-info">
                                    <span>需要机器:</span>
                                    <div class="machine-slot">
                                        <img src="${mainRecipe.machineIcon || ''}">
                                    </div>
                                    <div class="machine-name-mc">${mainRecipe.machine || ''}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            document.getElementById('detail-left-content').innerHTML = `
                <div class="detail-header">
                    <h1>${item.name}</h1>
                    ${item.technicalId ? `<span>${item.technicalId}</span>` : ''}
                    <div class="tag-container">
                        ${item.mainTag ? `<div class="tag-pill tag-main">${item.mainTag}</div>` : ''}
                        ${item.subTag ? `<div class="tag-pill tag-sub">${item.subTag}</div>` : ''}
                    </div>
                </div>
                
                <div class="detail-desc">
                    <p>${item.description}</p>
                </div>

                <div style="flex:1; display:flex; align-items:center; justify-content:center; margin-bottom: 50px;">
                    <img src="${item.image}" style="max-width:300px; filter:drop-shadow(0 20px 40px rgba(0,0,0,0.1));">
                </div>

                ${recipesHTML ? `
                <div class="recipe-section-title">获取方式</div>
                ${recipesHTML}
                ` : ''}
            `;

            document.getElementById('detail-right-content').innerHTML = `
                <div>
                    <div class="recipe-section-title">物品信息</div>
                    <div style="padding-left: 20px;">
                        ${item.material ? `<div class="property-item"><b>材质:</b> <span>${item.material}</span></div>` : ''}
                        <div class="property-item"><b>数量:</b> <span>${item.quantity || 1}</span></div>
                        ${item.addon ? `<div class="property-item"><b>附属:</b> <a href="#">${item.addon}</a></div>` : ''}
                        ${item.itemGroup ? `<div class="property-item"><b>物品组:</b> <a href="#">${item.itemGroup}</a></div>` : ''}
                    </div>
                </div>

                <div class="chain-btn-terminal" onclick="toggleChain(true)">
                    ⛓️ 查看制造链路
                </div>
            `;
        }

        // --- D. 流程图逻辑 ---
        let selectedNode = null;

        function toggleChain(show) {
            const chainView = document.getElementById('view-chain');
            chainView.style.display = show ? 'flex' : 'none';
            if (show) {
                renderChain();
                resetChainPosition();
            }
        }

        function closePreview() {
            document.getElementById('chain-preview-panel').classList.remove('active');
            selectedNode = null;
            document.querySelectorAll('.chain-node').forEach(n => n.classList.remove('selected'));
        }

        function selectNode(nodeData, element) {
            selectedNode = nodeData;
            
            // UI 反馈
            document.querySelectorAll('.chain-node').forEach(n => n.classList.remove('selected'));
            element.classList.add('selected');

            // 填充预览面板
            const panel = document.getElementById('chain-preview-panel');
            const img = document.getElementById('preview-img');
            const title = document.getElementById('preview-title');
            const tag = document.getElementById('preview-tag');
            const desc = document.getElementById('preview-desc');
            const switchBtn = document.getElementById('preview-btn-switch');
            const wikiBtn = document.getElementById('preview-btn-wiki');

            const itemDetail = wikiData.itemDetails[nodeData.id] || Object.values(wikiData.itemDetails).find(d => d.name === (nodeData.name || nodeData.machine));

            img.src = nodeData.img || (itemDetail ? itemDetail.image : '');
            title.innerText = nodeData.name || nodeData.machine;
            tag.innerText = nodeData.machine ? '设备' : '物品';
            
            if (itemDetail) {
                desc.innerHTML = itemDetail.description;
            } else if (nodeData.machine) {
                desc.innerHTML = `<p>生产设备：${nodeData.machine}</p><p>所需时长：${nodeData.time}</p>`;
            } else {
                desc.innerHTML = '暂无详细描述';
            }

            // 按钮逻辑
            if (itemDetail) {
                wikiBtn.style.display = 'flex';
                wikiBtn.onclick = () => {
                    toggleChain(false);
                    const itemId = Object.keys(wikiData.itemDetails).find(key => wikiData.itemDetails[key] === itemDetail);
                    navigateTo({view: 'detail', item: itemId});
                };
                
                if (itemDetail.recipes) {
                    switchBtn.style.display = 'flex';
                    switchBtn.innerText = '查看生成路径';
                    switchBtn.onclick = () => {
                        const itemId = Object.keys(wikiData.itemDetails).find(key => wikiData.itemDetails[key] === itemDetail);
                        navigateTo({view: 'detail', item: itemId});
                        toggleChain(true); 
                    };
                } else {
                    switchBtn.style.display = 'none';
                }
            } else {
                wikiBtn.style.display = 'none';
                switchBtn.style.display = 'none';
            }

            panel.classList.add('active');
        }

        function renderChain() {
            const wrapper = document.getElementById('flow-wrapper');
            const targetItem = wikiData.itemDetails[currentState.item];
            if (!targetItem) return;

            // 1. 递归构建上游链路 (Ingredients -> Machine -> Target)
            function buildUpstreamHTML(itemId, isMain = false) {
                const item = wikiData.itemDetails[itemId];
                if (!item) return '';

                // 基础物品节点
                const itemHTML = `
                    <div class="chain-node ${isMain ? 'selected' : ''}" 
                         onclick="selectNode({id:'${itemId}', name:'${item.name}', img:'${item.image}', type:'item'}, this)">
                        ${isMain ? '<div style="position:absolute; top:-40px; background:rgba(0,0,0,0.05); padding:4px 15px; border-radius:20px; font-size:11px; font-weight:bold; color:#666; white-space:nowrap;">链路主体</div>' : ''}
                        <div style="width:120px; height:120px; background:white; border:1.5px solid #333; display:flex; align-items:center; justify-content:center; box-shadow: 12px 12px 0 rgba(0,0,0,0.05);">
                            <img src="${item.image}" style="width:90px;">
                        </div>
                        <div style="font-size:13px; font-weight:bold; background:#eee; padding:3px 12px; margin-top:10px;">${item.name}</div>
                    </div>
                `;

                if (!item.recipes || item.recipes.length === 0) return itemHTML;

                // 优先选择顶级路径 (isMain)，否则选第一个
                const recipe = item.recipes.find(r => r.isMain) || item.recipes[0];
                const inputColumns = recipe.inputs.map(input => buildUpstreamHTML(input.id));

                return `
                    <div class="flow-group">
                        <div class="flow-column">${inputColumns.join('')}</div>
                        <div class="flow-column">
                            <div class="chain-node" onclick="selectNode({machine:'${recipe.machine}', time:'${recipe.time}', img:'https://via.placeholder.com/80?text=Machine'}, this)">
                                <div style="background:#333; color:white; padding:12px 20px; font-size:14px; font-weight:bold; display:flex; align-items:center; gap:10px;">
                                    ⚙️ ${recipe.machine} <span style="opacity:0.6; font-size:12px;">⏱️ ${recipe.time}</span>
                                </div>
                            </div>
                            <div class="recipe-path-line"></div>
                        </div>
                        ${itemHTML}
                    </div>
                `;
            }

            // 2. 构建下游链路 (Target -> Machine -> Usage)
            function buildDownstreamHTML(itemId) {
                const usages = [];
                for (const id in wikiData.itemDetails) {
                    const item = wikiData.itemDetails[id];
                    if (item.recipes) {
                        item.recipes.forEach(recipe => {
                            if (recipe.inputs.some(input => input.id === itemId)) {
                                usages.push({ targetId: id, machine: recipe.machine, time: recipe.time });
                            }
                        });
                    }
                }

                if (usages.length === 0) return '';

                return `
                    <div class="flow-column" style="margin-left: 40px;">
                        ${usages.map(usage => {
                            const useItem = wikiData.itemDetails[usage.targetId];
                            return `
                                <div class="flow-group">
                                    <div class="flow-column">
                                        <div class="recipe-path-line dashed downstream-out"></div>
                                        <div class="chain-node" onclick="selectNode({machine:'${usage.machine}', time:'${usage.time}', img:'https://via.placeholder.com/80?text=Machine'}, this)">
                                            <div style="background:rgba(0,0,0,0.05); color:#666; padding:8px 15px; font-size:12px; font-weight:bold; display:flex; align-items:center; gap:8px; border:1px dashed #999;">
                                                📦 ${usage.machine}
                                            </div>
                                        </div>
                                    </div>
                                    <div class="chain-node" onclick="selectNode({id:'${usage.targetId}', name:'${useItem.name}', img:'${useItem.image}', type:'item'}, this)">
                                        <div style="width:100px; height:100px; background:white; border:1.5px solid #c0c2c5; display:flex; align-items:center; justify-content:center; opacity:0.8; box-shadow: 8px 8px 0 rgba(0,0,0,0.03);">
                                            <img src="${useItem.image}" style="width:70px;">
                                        </div>
                                        <div style="font-size:11px; font-weight:bold; color:#666; margin-top:8px;">${useItem.name}</div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }

            const upstreamHTML = buildUpstreamHTML(currentState.item, true);
            const downstreamHTML = buildDownstreamHTML(currentState.item);

            wrapper.innerHTML = `
                <div style="display:flex; align-items:center;">
                    ${upstreamHTML}
                    ${downstreamHTML}
                </div>
            `;
            
            // 默认选中主体
            const mainNode = wrapper.querySelector('.chain-node.selected');
            if (mainNode) {
                selectNode({id: currentState.item, name: targetItem.name, img: targetItem.image, type: 'item'}, mainNode);
            }
        }

        // --- E. 搜索逻辑 ---
        const searchInput = document.getElementById('global-search-input');
        const searchPanel = document.getElementById('search-results-panel');

        searchInput.oninput = (e) => {
            const val = e.target.value.trim().toLowerCase();
            if (!val) {
                searchPanel.style.display = 'none';
                return;
            }

            // 搜索物品
            const results = [];
            Object.keys(wikiData.itemDetails).forEach(id => {
                const item = wikiData.itemDetails[id];
                if (item.name.toLowerCase().includes(val)) {
                    results.push({ id, name: item.name, type: '物品', img: item.image || item.img });
                }
            });

            // 搜索分类
            Object.values(wikiData.categories).flat().forEach(cat => {
                if (cat.name.toLowerCase().includes(val)) {
                    results.push({ catId: cat.id, name: cat.name, type: '分类', img: '' });
                }
            });

            if (results.length > 0) {
                searchPanel.innerHTML = results.map(r => `
                    <div class="search-result-item" onclick="handleSearchResult('${r.id}', '${r.catId}')">
                        ${r.img ? `<img src="${r.img}">` : '<div style="width:32px; height:32px; background:#eee;"></div>'}
                        <div class="search-result-name">${r.name}</div>
                        <div class="search-result-type">${r.type}</div>
                    </div>
                `).join('');
                searchPanel.style.display = 'block';
            } else {
                searchPanel.innerHTML = '<div style="padding:20px; text-align:center; color:#999; font-size:13px;">未找到匹配内容</div>';
                searchPanel.style.display = 'block';
            }
        };

        function handleSearchResult(itemId, catId) {
            searchPanel.style.display = 'none';
            searchInput.value = '';
            if (itemId !== 'undefined') {
                navigateTo({view: 'detail', item: itemId});
            } else if (catId !== 'undefined') {
                // 查找该分类所属的大类
                let atlasId = null;
                for (const aId in wikiData.categories) {
                    if (wikiData.categories[aId].find(c => c.id === catId)) {
                        atlasId = aId;
                        break;
                    }
                }
                navigateTo({view: 'list', atlas: atlasId, cat: catId});
            }
        }

        // 点击外部关闭搜索面板
        window.onclick = (e) => {
            if (!e.target.closest('.search-input-wrapper')) {
                searchPanel.style.display = 'none';
            }
        };

        // --- H. 拖拽功能实现 ---
        const draggableArea = document.getElementById('chain-draggable-area');
        const flowWrapper = document.getElementById('flow-wrapper');
        let isDragging = false;
        let startX, startY, currentX = 0, currentY = 0;

        draggableArea.onmousedown = (e) => {
            isDragging = true;
            draggableArea.style.cursor = 'grabbing';
            startX = e.clientX - currentX;
            startY = e.clientY - currentY;
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;
            currentX = e.clientX - startX;
            currentY = e.clientY - startY;
            flowWrapper.style.transform = `translate(${currentX}px, ${currentY}px)`;
        };

        window.onmouseup = () => {
            isDragging = false;
            draggableArea.style.cursor = 'grab';
        };

        function resetChainPosition() {
            currentX = 0;
            currentY = 0;
            flowWrapper.style.transform = `translate(0px, 0px)`;
        }

        // --- F. 初始化 ---
        document.getElementById('splashScreen').onclick = () => {
            document.getElementById('splashScreen').classList.add('slide-up');
            navigateTo({view:'home'});
        };

        document.getElementById('global-close-btn').onclick = () => {
            // 如果制造链路开启，先关闭链路
            if (document.getElementById('view-chain').style.display === 'flex') {
                toggleChain(false);
                return;
            }
            
            if (currentState.view === 'detail') navigateTo({view:'list', item:null});
            else if (currentState.view === 'list') navigateTo({view:'home', atlas:null, cat:null});
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.getElementById('view-chain').style.display === 'flex') {
                    toggleChain(false);
                } else {
                    document.getElementById('global-close-btn').click();
                }
            }
        });
    </script>
</body>
</html>
